<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Piped Scraper</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root[data-theme="light"] { --bg: #f5f5f5; --card: #ffffff; --text: #222; --text-muted: #666; --border: #ccc; --input-bg: #fff; --highlight: #d32f2f; }
        :root[data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #eee; --text-muted: #aaa; --border: #333; --input-bg: #121212; --highlight: #ff0000; }
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 800px; margin: auto; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
        h2, h3 { text-align: center; color: var(--highlight); margin-bottom: 5px; }
        .section { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        label { display: block; margin-top: 10px; font-size: 14px; color: var(--text-muted); font-weight: bold; }
        input[type="search"], input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 12px; margin-top: 5px; box-sizing: border-box; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 15px; }
        .big-search-box { font-size: 20px !important; padding: 18px !important; border: 3px solid var(--highlight) !important; font-weight: bold; border-radius: 8px !important; }
        .big-search-box:focus { outline: none; border-color: #4caf50 !important; }
        .helper-text { font-size: 13px; color: var(--text-muted); margin: 5px 0 15px 0; line-height: 1.5; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 6px; }
        .row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .row > div { flex: 1; }
        button { width: 100%; padding: 14px; margin-top: 10px; background: var(--highlight); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:active { filter: brightness(0.8); }
        .btn-green { background: #4caf50; } .btn-gray { background: #777; } .btn-warning { background: #f57c00; font-size: 14px; padding: 10px; }
        .btn-auth { background: #4285F4; }
        #status { text-align: center; color: #ffaa00; font-weight: bold; margin-bottom: 15px; font-size: 16px; padding: 12px; border-radius: 6px; background: rgba(255, 170, 0, 0.1); }
        #resultsDiv { max-height: 500px; overflow-y: auto; background: var(--input-bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; }
        .result-item { border-bottom: 1px solid var(--border); padding: 12px 0; }
        .result-item:last-child { border-bottom: none; }
        .result-checkbox { transform: scale(1.5); margin-right: 15px; accent-color: var(--highlight); }
        .badge { font-size: 11px; padding: 4px 6px; border-radius: 4px; font-weight: bold; margin-right: 8px; }
        .badge-video { background: #e53935; color: white; } .badge-playlist { background: #1e88e5; color: white; } .badge-channel { background: #8e24aa; color: white; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-toggle { background: transparent; color: var(--text); border: 2px solid var(--border); width: auto; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div></div><h2>YT Piped Scraper</h2><button class="theme-toggle" onclick="toggleTheme()">🌓 Toggle Day/Night</button>
    </div>

    <div id="status">Status: Ready to Search</div>

    <div class="section" style="border: 2px solid #4caf50;">
        <form id="searchForm" action="javascript:void(0);" onsubmit="executeSearch(); return false;">
            <label style="font-size: 18px; color: var(--text);">🔍 What do you want to scrape?</label>
            <div class="helper-text">
                <b>1. Keyword Search:</b> Type any term (e.g., <i>Python Tutorial</i>)<br>
                <b>2. Channels:</b> Paste ID starting with <b>UC...</b><br>
                <b>3. Playlists:</b> Paste ID starting with <b>PL...</b>
            </div>
            
            <input type="search" id="searchQuery" class="big-search-box" enterkeyhint="search" placeholder="Type or paste ID here..." required>
            
            <div class="row">
                <div>
                    <label>Filter By Type:</label>
                    <select id="searchType">
                        <option value="all">All Types</option>
                        <option value="video" selected>Videos Only</option>
                        <option value="playlist">Playlists Only</option>
                        <option value="channel">Channels Only</option>
                    </select>
                </div>
                <div>
                    <label>Search Limit:</label>
                    <select id="maxResults">
                        <option value="20">20 Results</option>
                        <option value="50" selected>50 Results</option>
                        <option value="100">100 Results</option>
                        <option value="250">250 Results (Slower)</option>
                    </select>
                </div>
            </div>
            <button type="submit" style="font-size: 18px; padding: 18px; margin-top: 15px;">🚀 RUN SEARCH</button>
        </form>
    </div>

    <div class="section">
        <label>⚙️ Scraping Engine Setup:</label>
        <select id="engineSelect" onchange="switchEngine()">
            <option value="public" selected>🟢 Public Mode (Piped API Engine - Fast & Stable)</option>
            <option value="private">🔴 Private Mode (Requires Google API Key)</option>
        </select>

        <div id="publicSettings" style="margin-top: 10px;">
            <label style="display:flex; align-items:center; margin-top:10px; font-weight:bold; color:#ffaa00;">
                <input type="checkbox" id="useProxy" style="width:auto; transform:scale(1.5); margin-right:12px;" onchange="saveKeys()" checked>
                Enable CORS Proxy Matrix (Keep checked if Piped nodes are failing)
            </label>
        </div>

        <div id="privateSettings" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);">
            <div class="row">
                <div><label>Google API Key:</label><input type="password" id="apiKey" onchange="saveKeys()"></div>
                <div><label>OAuth Client ID:</label><input type="password" id="clientId" onchange="saveKeys()"></div>
            </div>
            <button class="btn-auth" id="loginBtn" onclick="handleAuth()">👤 Log In (For Private Features)</button>
        </div>
    </div>

    <div class="section">
        <label>🧹 Local Filter (Instantly hide unwanted videos):</label>
        <input type="text" id="localFilter" placeholder="e.g., type 'tutorial' to only show matching videos..." onkeyup="filterResultsList()">
    </div>

    <div class="section">
        <div id="resultsDiv">Results will appear here...</div>
        <div class="row">
            <button class="btn-gray" onclick="toggleSelectAll()">☑️ Select/Deselect All</button>
            <button class="btn-green" onclick="addSelectedToQueue()">⬇️ Add Selected to Queue</button>
        </div>
    </div>

    <div class="section">
        <h3 style="color: #4caf50; margin-top:0;">📦 The Download Queue</h3>
        <textarea id="urlQueue" rows="8" placeholder="URLs will stack up here..."></textarea>
        <div class="row">
            <button class="btn-gray" onclick="clearQueue()">🗑️ Clear</button>
            <button class="btn-gray" onclick="copyQueue()">📋 Copy</button>
            <button class="btn-gray" onclick="exportQueueTxt()">💾 Export .TXT</button>
        </div>
    </div>

    <script>
        let accessToken = null;
        let currentResults = [];
        
        // --- PIPED API & PROXY LOGIC ---
        const PIPED_NODES = [
            "https://pipedapi.kavin.rocks",
            "https://pipedapi.tokhmi.xyz",
            "https://pipedapi.drgns.space"
        ];
        
        const PROXIES = [
            "https://corsproxy.io/?", 
            "https://api.allorigins.win/raw?url="
        ];

        async function fetchPublic(endpoint) {
            const useProxy = document.getElementById('useProxy').checked;
            document.getElementById('status').innerText = "Connecting to Piped API... Please wait.";

            let proxiesToTry = useProxy ? PROXIES : [""]; 

            for (let proxy of proxiesToTry) {
                for (let baseUrl of PIPED_NODES) {
                    try {
                        let targetUrl = baseUrl + endpoint;
                        if(useProxy && proxy !== "") targetUrl = proxy + encodeURIComponent(targetUrl);
                        
                        // 5 Second Kill Switch
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 5000);
                        
                        let res = await fetch(targetUrl, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        
                        if (!res.ok) continue; 
                        let data = await res.json();
                        if (data.error) continue; 
                        return data;
                    } catch (e) {
                        continue; 
                    }
                }
            }
            throw new Error("All Piped connections failed. The servers are likely rate-limiting your network. Switch to Private Mode or try again later.");
        }

        function initTheme() { document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light'); }
        function toggleTheme() {
            const target = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target); localStorage.setItem('theme', target);
        }
        
        window.onload = function() { 
            initTheme(); 
            if(localStorage.getItem('ytApiKey')) document.getElementById('apiKey').value = localStorage.getItem('ytApiKey'); 
            if(localStorage.getItem('ytClientId')) document.getElementById('clientId').value = localStorage.getItem('ytClientId');
            if(localStorage.getItem('ytUseProxy') !== null) document.getElementById('useProxy').checked = localStorage.getItem('ytUseProxy') === 'true';
        }
        
        function saveKeys() { 
            localStorage.setItem('ytApiKey', document.getElementById('apiKey').value.trim()); 
            localStorage.setItem('ytClientId', document.getElementById('clientId').value.trim()); 
            localStorage.setItem('ytUseProxy', document.getElementById('useProxy').checked);
        }
        
        function switchEngine() {
            const isPrivate = document.getElementById('engineSelect').value === 'private';
            document.getElementById('privateSettings').style.display = isPrivate ? 'block' : 'none';
            document.getElementById('publicSettings').style.display = isPrivate ? 'none' : 'block';
            document.getElementById('status').innerText = isPrivate ? "Mode: Private API" : "Mode: Public Engine";
        }

        function handleAuth() {
            const clientId = document.getElementById('clientId').value.trim();
            if(!clientId) return alert("Enter OAuth Client ID.");
            google.accounts.oauth2.initTokenClient({ client_id: clientId, scope: 'https://www.googleapis.com/auth/youtube.force-ssl', callback: (r) => { if (r && r.access_token) { accessToken = r.access_token; document.getElementById('status').innerText = "Logged In ✅"; } } }).requestAccessToken();
        }

        async function executeSearch() {
            if (document.activeElement) document.activeElement.blur(); 
            
            const query = document.getElementById('searchQuery').value.trim();
            const type = document.getElementById('searchType').value;
            const engine = document.getElementById('engineSelect').value;
            const targetMax = parseInt(document.getElementById('maxResults').value);
            const status = document.getElementById('status');
            
            document.getElementById('resultsDiv').innerHTML = "<div style='text-align:center; padding: 20px; font-weight:bold;'>Fetching data...</div>";
            currentResults = [];
            document.getElementById('localFilter').value = "";
            
            try {
                if (engine === 'public') {
                    let filter = type === 'all' ? 'all' : (type === 'video' ? 'videos' : (type === 'playlist' ? 'playlists' : 'channels'));
                    let nextPage = "";
                    let keepFetching = true;
                    
                    while(keepFetching && currentResults.length < targetMax) {
                        status.innerText = `Fetching from Piped... (${currentResults.length} found)`;
                        let endpoint = `/search?q=${encodeURIComponent(query)}&filter=${filter}`;
                        if (nextPage) endpoint += `&nextpage=${nextPage}`;
                        
                        let data = await fetchPublic(endpoint);
                        if(!data.items || data.items.length === 0) break;
                        
                        let mapped = data.items.map(item => {
                            let kind = item.type === 'stream' ? 'video' : item.type;
                            let idExtract = "";
                            if(kind === 'video') idExtract = item.url.split('v=')[1]?.split('&')[0];
                            else if(kind === 'playlist') idExtract = item.url.split('list=')[1];
                            else if(kind === 'channel') idExtract = item.url.split('/channel/')[1];
                            
                            return {
                                title: item.title || item.name, 
                                kind: kind, 
                                videoId: kind === 'video' ? idExtract : null, 
                                playlistId: kind === 'playlist' ? idExtract : null, 
                                channelId: kind === 'channel' ? idExtract : null
                            };
                        });
                        
                        currentResults.push(...mapped);
                        nextPage = data.nextpage;
                        
                        if(currentResults.length >= targetMax || !nextPage) { 
                            currentResults = currentResults.slice(0, targetMax); 
                            break; 
                        }
                    }
                } else {
                    const apiKey = document.getElementById('apiKey').value.trim();
                    let urlSnippet = `search?part=snippet&maxResults=${targetMax > 50 ? 50 : targetMax}`; 
                    if(type !== 'all') urlSnippet += `&type=${type}`;
                    if (query.startsWith("UC") && query.length === 24) urlSnippet += `&channelId=${query}`; else if (query) urlSnippet += `&q=${encodeURIComponent(query)}`;
                    let finalUrl = `https://www.googleapis.com/youtube/v3/${urlSnippet}&key=${apiKey}`;
                    
                    let res = await fetch(finalUrl, { headers: accessToken ? { 'Authorization': `Bearer ${accessToken}` } : {} });
                    let data = await res.json();
                    if(data.error) throw new Error(data.error.message);
                    
                    currentResults = data.items.map(item => ({
                        title: item.snippet.title, kind: item.id.kind.replace('youtube#', ''), videoId: item.id.videoId, playlistId: item.id.playlistId, channelId: item.id.channelId || item.snippet.channelId
                    }));
                }
                renderResults();
                status.innerText = `✅ Successfully fetched ${currentResults.length} items.`;
                status.style.background = "rgba(76, 175, 80, 0.1)"; status.style.color = "#4caf50";
            } catch (err) { 
                document.getElementById('resultsDiv').innerHTML = `<div style="color:#ff0000; font-weight:bold; padding:10px;">${err.message}</div>`; 
                status.innerText = "❌ Search Failed."; status.style.color = "#ff0000";
            }
        }

        async function scrapeAll(id, targetType) {
            const engine = document.getElementById('engineSelect').value;
            const status = document.getElementById('status');
            document.getElementById('resultsDiv').innerHTML = "<h3 style='color:#f57c00; text-align:center;'>⏳ Scraping ALL contents... This takes time.</h3>";
            currentResults = [];
            document.getElementById('localFilter').value = "";
            
            try {
                if(engine === 'public') {
                    if(targetType === 'playlist') {
                        let data = await fetchPublic(`/playlists/${id}`);
                        currentResults = data.relatedStreams.map(v => ({ title: v.title, kind: 'video', videoId: v.url.split('v=')[1]?.split('&')[0] }));
                    } else if (targetType === 'channel') {
                        // Piped fetches all channel uploads dynamically without pagination loops
                        let data = await fetchPublic(`/channel/${id}`);
                        currentResults = data.relatedStreams.map(v => ({ title: v.title, kind: 'video', videoId: v.url.split('v=')[1]?.split('&')[0] }));
                    }
                } else {
                    const apiKey = document.getElementById('apiKey').value;
                    let headers = accessToken ? { 'Authorization': `Bearer ${accessToken}` } : {};
                    let targetPlaylistId = id;
                    if(targetType === 'channel') {
                        let chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${id}&key=${apiKey}`, {headers}); let chData = await chRes.json();
                        targetPlaylistId = chData.items[0].contentDetails.relatedPlaylists.uploads;
                    }
                    let pageToken = '';
                    do {
                        status.innerText = `Fetching Page... (${currentResults.length} found)`;
                        let res = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${targetPlaylistId}&key=${apiKey}${pageToken ? '&pageToken='+pageToken : ''}`, {headers}); let data = await res.json();
                        currentResults.push(...data.items.map(item => ({ title: item.snippet.title, kind: 'video', videoId: item.snippet.resourceId.videoId })));
                        pageToken = data.nextPageToken || '';
                    } while(pageToken);
                }
                renderResults(); 
                status.innerText = `✅ Scraped ${currentResults.length} videos.`;
                status.style.background = "rgba(76, 175, 80, 0.1)"; status.style.color = "#4caf50";
            } catch (err) { 
                status.innerText = "❌ Scrape Failed."; 
                document.getElementById('resultsDiv').innerHTML = `<div style="color:#ff0000; font-weight:bold; padding:10px;">${err.message}</div>`; 
            }
        }

        function filterResultsList() {
            const filterText = document.getElementById('localFilter').value.toLowerCase();
            const items = document.querySelectorAll('.result-item');
            
            items.forEach(item => {
                const title = item.getAttribute('data-title').toLowerCase();
                if (title.includes(filterText)) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                    item.querySelector('.result-checkbox').checked = false; 
                }
            });
        }

        function renderResults() {
            const container = document.getElementById('resultsDiv');
            if(currentResults.length === 0) { container.innerHTML = "<div style='padding:10px; font-weight:bold;'>No items found.</div>"; return; }
            let html = '';
            currentResults.forEach((item, i) => {
                let link = "", badge = "", actions = "";
                if(item.kind === "video") { link = `https://www.youtube.com/watch?v=${item.videoId}`; badge = `<span class="badge badge-video">VID</span>`; }
                else if(item.kind === "playlist") { link = `https://www.youtube.com/playlist?list=${item.playlistId}`; badge = `<span class="badge badge-playlist">PL</span>`; actions = `<br><button class="btn-warning" onclick="scrapeAll('${item.playlistId}', 'playlist')">📥 Scrape ALL Videos inside this Playlist</button>`; }
                else if(item.kind === "channel") { link = `https://www.youtube.com/channel/${item.channelId}`; badge = `<span class="badge badge-channel">CH</span>`; actions = `<br><button class="btn-warning" onclick="scrapeAll('${item.channelId}', 'channel')">📥 Scrape ALL Uploads from this Channel</button>`; }
                
                html += `<div class="result-item" data-title="${(item.title || "").replace(/"/g, '&quot;')}"><input type="checkbox" class="result-checkbox" value="${link}" id="item${i}" checked><label style="display:inline; font-size:15px;" for="item${i}">${badge} ${item.title}</label>${actions}</div>`;
            });
            container.innerHTML = html;
        }

        function toggleSelectAll() { 
            let cbs = document.querySelectorAll('.result-item[style!="display: none;"] .result-checkbox'); 
            if(cbs.length === 0) return;
            let all = Array.from(cbs).every(cb => cb.checked); 
            cbs.forEach(cb => cb.checked = !all); 
        }
        
        function addSelectedToQueue() { 
            let urls = Array.from(document.querySelectorAll('.result-checkbox:checked')).map(cb => cb.value).filter(v => v); 
            if(!urls.length) return; 
            let q = document.getElementById('urlQueue'); 
            q.value = q.value ? q.value + "\n" + urls.join('\n') : urls.join('\n'); 
            document.getElementById('status').innerText = `📦 Added ${urls.length} URLs to queue.`; 
            document.getElementById('status').style.color = "#1e88e5";
        }
        
        function clearQueue() { if(confirm("Clear queue?")) document.getElementById('urlQueue').value = ""; }
        function copyQueue() { navigator.clipboard.writeText(document.getElementById('urlQueue').value); alert("Copied to clipboard!"); }
        function exportQueueTxt() { let link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([document.getElementById('urlQueue').value], { type: "text/plain" })); link.download = "YT_Queue.txt"; link.click(); }
    </script>
</body>
</html>
