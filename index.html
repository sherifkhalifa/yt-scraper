<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitwarden Test V7</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; max-width: 400px; margin: auto; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px;}
        input { width: 100%; padding: 12px; margin: 8px 0 15px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #5c8bc0; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #status { font-size: 18px; font-weight: bold; text-align: center; padding: 15px; border-radius: 8px; margin-bottom: 20px; color: white; transition: 0.3s; }
        .locked { background: #c05c5c; }
        .unlocked { background: #5c9c6f; }
        .err { color: #c05c5c; font-size: 13px; font-weight: bold; background: rgba(192,92,92,0.1); padding: 10px; border-radius: 6px; display: none; margin-top: 10px; }
        
        .vault-item { display:flex; justify-content:space-between; align-items:center; background:#fafafa; border:1px solid #ccc; padding:10px; border-radius:8px; margin-top:8px; cursor:pointer;}
        .btn-sm { width:auto; background:#c05c5c; padding:6px 12px; font-size:12px; border-radius:6px; }
    </style>
</head>
<body>

    <div id="status" class="locked">🔒 APP LOCKED</div>

    <div class="box">
        <h3 style="margin-top:0;">API Account Setup</h3>
        
        <label style="font-size:13px; font-weight:bold; color:#666;">Account Nickname (Optional):</label>
        <input type="text" id="nickname" placeholder="e.g. Primary Gmail">

        <form onsubmit="event.preventDefault();">
            <label style="font-size:13px; font-weight:bold; color:#666;">API Key:</label>
            <input type="password" id="username_ak" name="username" autocomplete="username" placeholder="AIzaSy...">
            
            <label style="font-size:13px; font-weight:bold; color:#666;">Client ID:</label>
            <input type="password" id="password_cid" name="password" autocomplete="current-password" placeholder="...apps.googleusercontent.com">
        </form>
        
        <button onclick="saveToVault()">💾 Save to Vault</button>
        <div id="keyError" class="err"></div>

        <div style="margin-top:20px; border-top:1px solid #ccc; padding-top:15px;">
            <label style="font-size:13px; font-weight:bold; color:#666;">Saved Vault Accounts:</label>
            <div id="vaultList"></div>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);
        let vault = JSON.parse(localStorage.getItem('test_vault') || '[]');

        // 1. MEMORY SAVE (Triggered only by typing, never by heartbeat)
        function saveToMemory() {
            localStorage.setItem('test_ak', $('username_ak').value.trim());
            localStorage.setItem('test_cid', $('password_cid').value.trim());
            checkStatus();
        }
        
        $('username_ak').addEventListener('input', saveToMemory);
        $('password_cid').addEventListener('input', saveToMemory);

        // 2. STATUS ENGINE (Read-only, powers the lock/unlock UI)
        function checkStatus() {
            let ak = $('username_ak').value.trim();
            let cid = $('password_cid').value.trim();

            let errBox = $('keyError');
            let statusBox = $('status');
            let errors = [];

            if(ak && (!ak.startsWith('AIza') || ak.length < 30)) errors.push("⚠️ API Key format warning.");
            if(cid && (!cid.includes('apps.googleusercontent.com') || cid.length < 40)) errors.push("⚠️ Client ID format warning.");

            if(errors.length > 0) { errBox.innerHTML = errors.join('<br>'); errBox.style.display = 'block'; } 
            else { errBox.style.display = 'none'; }

            if(ak.length > 0 || cid.length > 0) {
                statusBox.className = 'unlocked'; statusBox.innerText = '✅ APP UNLOCKED';
            } else {
                statusBox.className = 'locked'; statusBox.innerText = '🔒 APP LOCKED';
            }
        }

        // 3. VAULT LOGIC
        function saveToVault() {
            let ak = $('username_ak').value.trim();
            let cid = $('password_cid').value.trim();
            let nick = $('nickname').value.trim();

            if(!ak && !cid) return alert("Enter an API key first!");
            if(!nick) nick = ak ? `Key ...${ak.slice(-4)}` : `ID ...${cid.slice(-4)}`;

            vault.push({ n: nick, ak: ak, cid: cid });
            localStorage.setItem('test_vault', JSON.stringify(vault));
            $('nickname').value = '';
            renderVault();
        }

        function renderVault() {
            let html = '';
            if(vault.length === 0) html = '<div style="font-size:12px; color:#666;">No keys saved yet.</div>';
            vault.forEach((v, i) => {
                html += `
                <div class="vault-item" onclick="loadVault(${i})">
                    <div>
                        <div style="font-weight:bold; font-size:14px; color:#5c8bc0;">${v.n}</div>
                        <div style="font-size:11px; color:#666; font-family:monospace;">...${v.ak.slice(-8)}</div>
                    </div>
                    <button class="btn-sm" onclick="event.stopPropagation(); deleteVault(${i})">✖</button>
                </div>`;
            });
            $('vaultList').innerHTML = html;
        }

        function loadVault(i) {
            $('username_ak').value = vault[i].ak;
            $('password_cid').value = vault[i].cid;
            saveToMemory(); 
        }

        function deleteVault(i) {
            vault.splice(i, 1);
            localStorage.setItem('test_vault', JSON.stringify(vault));
            renderVault();
        }

        // 4. BOOT & HEARTBEAT
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('test_ak')) $('username_ak').value = localStorage.getItem('test_ak');
            if(localStorage.getItem('test_cid')) $('password_cid').value = localStorage.getItem('test_cid');
            renderVault();
            checkStatus();
        });

        setInterval(checkStatus, 500); 
    </script>
</body>
</html>
