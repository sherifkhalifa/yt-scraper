<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Fast Scraper</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root[data-theme="light"]{--bg:#f0f2f5;--card:#fff;--text:#333;--text-muted:#666;--border:#dadae0;--input-bg:#fafafa;--primary:#5c8bc0;--success:#5c9c6f;--warning:#c28c46;--danger:#c05c5c;--purple:#9074b3}
        :root[data-theme="dark"]{--bg:#121212;--card:#1e1e1e;--text:#e4e6eb;--text-muted:#aaa;--border:#333;--input-bg:#2a2a2a;--primary:#6b9fd4;--success:#6ba87e;--warning:#d9a05b;--danger:#d46b6b;--purple:#a689cc}
        body{font-family:-apple-system,sans-serif;padding:10px;max-width:800px;margin:auto;background:var(--bg);color:var(--text);transition:.3s}
        
        /* TOP BAR */
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        h2{font-weight:800;font-size:20px;margin:0;letter-spacing:-0.5px}
        .top-actions{display:flex;gap:8px}
        .btn-sm{background:var(--card);color:var(--text);border:1px solid var(--border);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:bold;cursor:pointer}
        .btn-auth{background:var(--primary);color:#fff;border:none} .btn-auth.logged-in{background:var(--success)}

        /* CONTAINERS */
        .section{background:var(--card);padding:15px;border-radius:12px;margin-bottom:15px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        label.lbl{display:block;margin-top:8px;font-size:13px;color:var(--text-muted);font-weight:600}
        input,select,textarea{width:100%;padding:12px;margin-top:6px;box-sizing:border-box;background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:15px}
        input:focus,select:focus,textarea:focus{border-color:var(--primary);outline:none}
        .row{display:flex;gap:10px;align-items:center} .row>div{flex:1}
        
        .big-search{font-size:16px!important;padding:14px!important;font-weight:bold;border:2px solid var(--primary)!important;margin-bottom:10px}
        .btn-main{width:100%;padding:14px;margin-top:10px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:bold;font-size:15px;cursor:pointer}
        .btn-main:disabled{background:var(--border)!important;color:var(--text-muted)!important}
        .btn-suc{background:var(--success);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:bold;cursor:pointer;flex:1}
        .btn-gry{background:var(--text-muted);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:bold;cursor:pointer;flex:1}

        /* FILTERS & TOGGLES */
        details.filters{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px}
        details.filters summary{font-size:14px;font-weight:bold;color:var(--text);cursor:pointer;outline:none}
        .cat-btn{background:var(--input-bg);color:var(--text-muted);border:1px solid var(--border);padding:8px 10px;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer;flex:1;text-align:center;transition:.2s}
        .cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

        /* ROCK-SOLID UI GRID */
        #resDiv{max-height:550px;overflow-y:auto;background:var(--card);border-radius:8px;overflow-x:hidden}
        .yt-item{display:table;width:100%;table-layout:fixed;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
        .yt-item:last-child{border-bottom:none}
        .yt-col-chk{display:table-cell;vertical-align:middle;width:40px;text-align:center}
        .yt-chk{transform:scale(1.4);accent-color:var(--primary);margin:0}
        .yt-col-img{display:table-cell;vertical-align:top;width:130px}
        .yt-pic{width:120px;height:68px;object-fit:cover;border-radius:6px;background:#222;display:block}
        .yt-col-dat{display:table-cell;vertical-align:top;padding-left:10px;padding-right:10px}
        
        /* EXPANDABLE TEXT */
        .yt-ttl{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-wrap:break-word;white-space:normal}
        .expanded-text .yt-ttl {display:block; -webkit-line-clamp:unset; overflow:visible}
        
        .yt-chn{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .yt-col-opt{display:table-cell;vertical-align:middle;width:40px;text-align:center}
        .menu-btn{background:none;border:none;color:var(--text);font-size:20px;padding:10px;cursor:pointer}

        .badge{font-size:10px;padding:2px 4px;border-radius:4px;font-weight:bold;margin-right:4px} 
        .b-vid{background:var(--danger);color:#fff} .b-pl{background:var(--primary);color:#fff} .b-ch{background:var(--purple);color:#fff}

        /* BOTTOM SHEET */
        #sheetOverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;z-index:999}
        #botSheet{position:fixed;bottom:-100%;left:0;right:0;background:var(--card);padding:20px;border-radius:20px 20px 0 0;box-shadow:0 -5px 15px rgba(0,0,0,0.3);transition:bottom 0.3s;z-index:1000}
        #sheetTitle{font-size:14px;font-weight:bold;color:var(--text);margin-top:0;margin-bottom:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .sheet-btn{width:100%;padding:14px;margin-bottom:10px;border:none;border-radius:8px;font-weight:bold;color:#fff;cursor:pointer}
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>YT Scraper</h2>
        <div class="top-actions">
            <button class="btn-sm" onclick="toggleTheme()">🌓 Theme</button>
            <button class="btn-sm btn-auth" id="authBtn" onclick="toggleAuth()">👤 Sign In</button>
        </div>
    </div>

    <div id="status" style="text-align:center;font-weight:bold;margin-bottom:15px;font-size:13px;padding:10px;border-radius:8px;background:var(--card);border:1px solid var(--border)">Checking app status...</div>

    <div class="section" id="appUI">
        <div id="lockMsg" onclick="document.getElementById('setupUI').scrollIntoView({behavior: 'smooth'})" style="text-align:center;color:var(--danger);font-weight:600;padding:12px;background:rgba(192,92,92,0.1);border-radius:8px;margin-bottom:15px;cursor:pointer;">🔒 App Locked. Tap here to setup keys.</div>
        <form action="javascript:void(0);" onsubmit="runSearch(); return false;">
            
            <label class="lbl">🔍 Search Query or Target ID:</label>
            <input type="search" id="qBox" class="big-search" placeholder="Keyword, UC..., or PL..." disabled required>

            <details class="filters">
                <summary>⚙️ Settings & Advanced Filters</summary>
                <div class="row" style="margin-top:10px;">
                    <div><label class="lbl">Limit:</label><select id="mBox" disabled><option value="25">25</option><option value="50" selected>50</option><option value="100">100</option><option value="250">250</option></select></div>
                    <div><label class="lbl">Type:</label><select id="tBox" disabled><option value="all" selected>All (Default)</option><option value="video">Videos</option><option value="playlist">Playlists</option><option value="channel">Channels</option></select></div>
                </div>
                <div class="row">
                    <div><label class="lbl">Duration (Search Only):</label><select id="durBox" disabled><option value="any">Any</option><option value="short">Shorts (< 4m)</option><option value="long">Long (> 20m)</option></select></div>
                    <div><label class="lbl">Broadcast (Search Only):</label><select id="liveBox" disabled><option value="any">Any</option><option value="completed">Past Live Streams</option><option value="live">Live Now</option></select></div>
                </div>
                <div class="row">
                    <div><label class="lbl">Date After:</label><input type="date" id="dAfter" disabled></div>
                    <div><label class="lbl">Date Before:</label><input type="date" id="dBefore" disabled></div>
                </div>
            </details>

            <button type="submit" id="sBtn" class="btn-main" disabled>🚀 RUN SEARCH</button>
        </form>
    </div>
    
    <div class="section" style="padding:15px;">
        <label class="lbl" style="margin-top:0;">🧹 Filter & View Options:</label>
        <div class="row" style="margin-bottom:10px; flex-wrap:wrap;">
            <button id="btn-cat-video" class="cat-btn active" onclick="toggleCat('video')">🎬 Videos</button>
            <button id="btn-cat-playlist" class="cat-btn" onclick="toggleCat('playlist')">📂 Playlists</button>
            <button id="btn-cat-channel" class="cat-btn" onclick="toggleCat('channel')">📺 Channels</button>
            <button class="cat-btn" style="background:var(--border);color:var(--text);" onclick="document.getElementById('resDiv').classList.toggle('expanded-text')">↕️ Expand Text</button>
        </div>
        <input type="text" id="filt" placeholder="Type a word to hide unwanted results..." onkeyup="drawRes()" disabled style="margin-bottom:15px;">
        
        <div id="resDiv"><div style="padding:20px; text-align:center; color:var(--text-muted);">Results will appear here...</div></div>
        
        <div class="row" style="margin-top:15px;">
            <button class="btn-gry" onclick="selAll()">☑️ Select All</button>
            <button class="btn-suc" onclick="addQ()">⬇️ Add to Queue</button>
        </div>
    </div>
    
    <div class="section">
        <h3 style="color:var(--success);margin-top:0;font-size:16px">📦 Download Queue</h3>
        <textarea id="qArea" rows="6"></textarea>
        <div class="row" style="margin-top:10px;">
            <button class="btn-gry" onclick="document.getElementById('qArea').value=''">Clear</button>
            <button class="btn-gry" onclick="navigator.clipboard.writeText(document.getElementById('qArea').value);alert('Copied!')">Copy</button>
            <button class="btn-suc" style="background:#4285F4;" onclick="shareQ()">Share</button>
        </div>
    </div>

    <form class="section" id="setupUI" style="margin-top:30px;border:1px dashed var(--border)" onsubmit="event.preventDefault();">
        <h3 style="margin-top:0;font-size:16px">🔑 Core API Setup</h3>
        <label class="lbl">API Key (Username Field):</label>
        <input type="text" id="ak" name="username" autocomplete="username" placeholder="AIzaSy..." oninput="saveK()">
        <label class="lbl">Client ID (Password Field):</label>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Authorize this exact URL in Google Console: <b class="dyn-url">...</b></div>
        <input type="password" id="cid" name="password" autocomplete="current-password" placeholder="...apps.googleusercontent.com" oninput="saveK()">
    </form>

    <div class="section" id="genUI" style="margin-top:15px;border:1px solid var(--border)">
        <h3 style="color:var(--purple);margin-top:0;font-size:15px">🛠️ Generate Clean App</h3>
        <label class="lbl">Reminder Email (Optional):</label>
        <input type="text" id="x_rem_z" placeholder="Your Google email..." autocomplete="off" data-bwignore="true">
        <button class="btn-main" style="background:var(--purple);margin-top:15px;" onclick="genApp()">📥 Download Clean App</button>
    </div>

    <div id="sheetOverlay" onclick="closeMenu()"></div>
    <div id="botSheet">
        <div style="width:40px;height:5px;background:var(--border);border-radius:5px;margin:0 auto 15px;"></div>
        <h4 id="sheetTitle">Options</h4>
        <button class="sheet-btn" style="background:var(--success);" onclick="scrapeParentChannel()">📺 View Channel Content (Sorted by Newest)</button>
        <button class="sheet-btn" style="background:var(--purple);" onclick="findPlaylists()">📂 Find ALL Playlists by Channel</button>
        <button class="sheet-btn" style="background:var(--text-muted);" onclick="closeMenu()">Cancel</button>
    </div>

    <script>
        let res=[], token=null;
        let menuTargetChannel = '';
        let showCat = { video: true, playlist: false, channel: false }; // Video default only
        
        const $=(id)=>document.getElementById(id);
        const getK=()=>window.H_AK || ($('ak')?$('ak').value.trim():"");
        const getC=()=>window.H_CID || ($('cid')?$('cid').value.trim():"");
        
        function initTheme() { document.documentElement.setAttribute('data-theme', localStorage.getItem('t')||'light'); }
        function toggleTheme() { let t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('t',t); }
        
        window.onload = function() {
            initTheme();
            if($('ak')&&localStorage.getItem('y_ak')) $('ak').value=localStorage.getItem('y_ak');
            if($('cid')&&localStorage.getItem('y_ci')) $('cid').value=localStorage.getItem('y_ci');
            
            let loc = (window.location.origin !== "null" && window.location.origin !== "file://") ? window.location.origin : "Local File";
            document.querySelectorAll('.dyn-url').forEach(el => el.innerText = loc);
            checkL(); 
        };

        function saveK() { if($('ak')) localStorage.setItem('y_ak',$('ak').value.trim()); if($('cid')) localStorage.setItem('y_ci',$('cid').value.trim()); checkL(); }

        function checkL() {
            let u = getK().length>10 || token;
            ['qBox','tBox','mBox','sBtn','dAfter','dBefore','filt','durBox','liveBox'].forEach(id=>{if($(id)) $(id).disabled=!u;});
            if($('lockMsg')) $('lockMsg').style.display=u?'none':'block';
            
            let authBtn = $('authBtn');
            if(authBtn) {
                if(!getC()) { authBtn.style.display = 'none'; }
                else {
                    authBtn.style.display = 'block';
                    if(token) { authBtn.innerText = 'Log Out'; authBtn.classList.add('logged-in'); } 
                    else { authBtn.innerText = '👤 Sign In'; authBtn.classList.remove('logged-in'); }
                }
            }

            if($('status')){
                if(u&&!token) $('status').innerHTML="<span style='color:var(--success)'>✅ Ready to search (API Key active).</span>";
                else if(token) $('status').innerHTML="<span style='color:var(--success)'>✅ Logged In (Expires in 1 Hour).</span>";
                else $('status').innerHTML="<span style='color:var(--danger)'>🔒 App Locked. Scroll down to setup keys.</span>";
            }
        }

        function toggleAuth() {
            if(!getC()) return alert("No Client ID found.");
            if(token) { token = null; checkL(); $('status').innerHTML="<span style='color:var(--warning)'>Logged out. Reverting to API Key.</span>"; } 
            else { google.accounts.oauth2.initTokenClient({ client_id: getC(), scope: 'https://www.googleapis.com/auth/youtube.readonly', callback: (r)=>{ if(r&&r.access_token){ token=r.access_token; checkL(); } } }).requestAccessToken(); }
        }

        // --- FILTER & UI LOGIC ---
        function toggleCat(cat) {
            showCat[cat] = !showCat[cat];
            let btn = $('btn-cat-'+cat);
            if(showCat[cat]) btn.classList.add('active'); else btn.classList.remove('active');
            drawRes();
        }

        function toggleRow(e, cbId) {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            let cb = $(cbId); cb.checked = !cb.checked;
        }

        function openMenu(e, channelId, titleText) {
            e.stopPropagation();
            if(!channelId || channelId === 'undefined') return alert("Could not find the parent channel ID.");
            menuTargetChannel = channelId;
            $('sheetTitle').innerText = titleText;
            $('sheetOverlay').style.display = 'block';
            setTimeout(() => $('botSheet').style.bottom = '0', 10);
        }
        function closeMenu() {
            $('botSheet').style.bottom = '-100%';
            setTimeout(() => $('sheetOverlay').style.display = 'none', 300);
        }
        function scrapeParentChannel() { closeMenu(); scrape(menuTargetChannel, 'channel'); }
        function findPlaylists() { closeMenu(); fetchPlaylists(menuTargetChannel); }

        function shareQ() {
            let txt = $('qArea').value;
            if(!txt) return alert("Queue is empty!");
            if(navigator.share) { navigator.share({ title: 'YT Scraper Links', text: txt }).catch(e=>console.log(e)); } 
            else { navigator.clipboard.writeText(txt); alert("Copied to clipboard!"); }
        }

        function genApp() {
            if(!getK()&&!getC()) return alert("Paste keys first.");
            if(getC() && !confirm("⚠️ IMPORTANT:\n\nYou MUST add your new web link to Google Console Authorized URIs, or Login will fail.\n\nContinue?")) return;
            
            let hc = document.documentElement.cloneNode(true);
            if(hc.querySelector('#setupUI')) hc.querySelector('#setupUI').remove();
            if(hc.querySelector('#genUI')) hc.querySelector('#genUI').remove();
            if(hc.querySelector('#lockMsg')) hc.querySelector('#lockMsg').remove();
            
            let emStr = $('x_rem_z').value ? `Account: ${$('x_rem_z').value}` : "Private App generated.";
            
            let genUrl = window.location.href;
            let f = document.createElement('div');
            f.innerHTML = `<div style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:20px;padding:15px;border-top:1px solid var(--border)">${emStr}<br><br><b class="dyn-url">...</b><br><br><a href="${genUrl}" style="color:var(--primary);text-decoration:none;font-weight:bold">🔄 Back to Generator</a></div>`;
            hc.querySelector('body').appendChild(f);

            let scr = document.createElement('script');
            scr.textContent = `window.H_AK="${getK()}";window.H_CID="${getC()}";window.onload=function(){initTheme();checkL();document.querySelectorAll('.dyn-url').forEach(e=>e.innerText=window.location.origin);};`;
            hc.querySelector('body').insertBefore(scr,hc.querySelector('body').firstChild);
            
            let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(["<!DOCTYPE html>\n<html lang='en'>\n"+hc.innerHTML+"\n</html>"], {type:'text/html'}));
            a.download = 'YT_Clean.html'; a.click();
        }

        function getThumb(snip) {
            if(!snip || !snip.thumbnails) return '';
            if(snip.thumbnails.medium && snip.thumbnails.medium.url) return snip.thumbnails.medium.url;
            if(snip.thumbnails.default && snip.thumbnails.default.url) return snip.thumbnails.default.url;
            return '';
        }

        async function runSearch() {
            if(!getK()&&!token) return; if(!$('qBox').value) return;
            $('resDiv').innerHTML="<div style='text-align:center;padding:30px;font-weight:bold;'>⏳ Searching...</div>"; res=[]; $('filt').value="";
            try {
                let q=$('qBox').value.trim(), pt='', f=0, mx=parseInt($('mBox').value), hd=token?{'Authorization':`Bearer ${token}`}:{};
                if(q.startsWith("PL")&&q.length>15) return scrape(q,'playlist');
                
                let aft=$('dAfter').value, bef=$('dBefore').value;
                let dur=$('durBox').value, liv=$('liveBox').value;

                while(f<mx){
                    let u=`search?part=snippet&maxResults=50`; if(!token) u+=`&key=${getK()}`; 
                    
                    if($('tBox').value !== 'all') u+=`&type=${$('tBox').value}`;
                    else if (dur !== 'any' || liv !== 'any') u+=`&type=video`; // API requires type=video for duration/live filters
                    
                    u+= (q.startsWith("UC")&&q.length===24) ? `&channelId=${q}` : `&q=${encodeURIComponent(q)}`; 
                    if(pt) u+=`&pageToken=${pt}`;
                    if(aft) u+=`&publishedAfter=${new Date(aft).toISOString()}`;
                    if(bef) u+=`&publishedBefore=${new Date(bef).toISOString()}`;
                    if(dur !== 'any') u+=`&videoDuration=${dur}`;
                    if(liv !== 'any') u+=`&eventType=${liv}`;

                    let d = await (await fetch(`https://www.googleapis.com/youtube/v3/${u}`,{headers:hd})).json();
                    if(d.error) throw new Error(d.error.message); if(!d.items) break;
                    
                    res.push(...d.items.map(i=>{
                        let s=i.snippet||{}, o=i.id||{};
                        return { t:s.title||'Unknown', k:(o.kind||'').replace('youtube#',''), v:o.videoId||'', p:o.playlistId||'', c:s.channelId||o.channelId||'', ct:s.channelTitle||'Unknown', th:getThumb(s) };
                    }));
                    f+=d.items.length; pt=d.nextPageToken; if(!pt||f>=mx) break;
                }
                if(res.length>mx) res=res.slice(0,mx); drawRes(); $('status').innerHTML=`<span style='color:var(--success)'>✅ Found ${res.length} items.</span>`;
            } catch(e) { $('resDiv').innerHTML=`<div style='color:var(--danger);padding:20px'>Error: ${e.message}</div>`; $('status').innerHTML="<span style='color:var(--danger)'>❌ Failed.</span>"; }
        }

        async function scrape(id, type) {
            $('resDiv').innerHTML="<div style='text-align:center;padding:30px;color:var(--primary);font-weight:bold;'>⏳ Loading Channel Content...</div>"; res=[]; $('filt').value="";
            let hd=token?{'Authorization':`Bearer ${token}`}:{};
            try {
                let tid = id;
                if(type==='channel'){
                    $('status').innerHTML="⏳ Locating channel database...";
                    let u=`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${id}`; if(!token) u+=`&key=${getK()}`;
                    let d = await (await fetch(u,{headers:hd})).json(); if(d.error) throw new Error(d.error.message);
                    if(!d.items||!d.items.length) throw new Error("Channel not found.");
                    tid = d.items[0].contentDetails.relatedPlaylists.uploads;
                }
                let pt=''; let pages=0;
                do {
                    pages++; $('status').innerHTML=`⏳ Scraping page ${pages}... (${res.length} grabbed)`;
                    let u=`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${tid}`; if(!token) u+=`&key=${getK()}`; if(pt) u+=`&pageToken=${pt}`;
                    let d = await (await fetch(u,{headers:hd})).json(); if(d.error) throw new Error(d.error.message);
                    
                    if(d.items) res.push(...d.items.map(i=>{
                        let s=i.snippet||{}, r=s.resourceId||{};
                        return { t:s.title||'Unknown', k:'video', v:r.videoId||'', c:s.videoOwnerChannelId||s.channelId||'', ct:s.videoOwnerChannelTitle||s.channelTitle||'Unknown', th:getThumb(s) };
                    }));
                    pt=d.nextPageToken||'';
                } while(pt);
                // Force "Videos" category toggle ON so results aren't accidentally hidden
                if(!showCat.video) toggleCat('video'); 
                drawRes(); $('status').innerHTML=`<span style='color:var(--success)'>✅ Scraped ${res.length} videos (Sorted Newest to Oldest).</span>`;
            } catch(e) { $('resDiv').innerHTML=`<div style='color:var(--danger);padding:20px'>${e.message}</div>`; $('status').innerHTML="<span style='color:var(--danger)'>❌ Scrape Failed.</span>"; }
        }

        async function fetchPlaylists(channelId) {
            $('resDiv').innerHTML="<div style='text-align:center;padding:30px;color:var(--purple);font-weight:bold;'>⏳ Finding Playlists...</div>"; res=[]; $('filt').value="";
            let hd=token?{'Authorization':`Bearer ${token}`}:{};
            try {
                let pt=''; let pages=0;
                do {
                    pages++; $('status').innerHTML=`⏳ Scanning page ${pages}...`;
                    let u=`https://www.googleapis.com/youtube/v3/playlists?part=snippet&channelId=${channelId}&maxResults=50`; if(!token) u+=`&key=${getK()}`; if(pt) u+=`&pageToken=${pt}`;
                    let d = await (await fetch(u,{headers:hd})).json(); if(d.error) throw new Error(d.error.message);
                    
                    if(d.items) res.push(...d.items.map(i=>{
                        let s=i.snippet||{};
                        return { t:s.title||'Unknown', k:'playlist', p:i.id||'', c:s.channelId||'', ct:s.channelTitle||'Unknown', th:getThumb(s) };
                    }));
                    pt=d.nextPageToken||'';
                } while(pt);
                // Force "Playlists" category toggle ON so results aren't hidden
                if(!showCat.playlist) toggleCat('playlist'); 
                drawRes(); $('status').innerHTML=`<span style='color:var(--success)'>✅ Found ${res.length} playlists.</span>`;
            } catch(e) { $('resDiv').innerHTML=`<div style='color:var(--danger);padding:20px'>${e.message}</div>`; $('status').innerHTML="<span style='color:var(--danger)'>❌ Search Failed.</span>"; }
        }

        function drawRes() {
            let f=$('filt').value.toLowerCase();
            let h=''; 
            let visibleCount = 0;

            res.forEach((i,x)=>{
                // 1. Check Category Toggle Filter
                if(!showCat[i.k]) return; 
                // 2. Check Text Filter
                if(f && !(i.t||'').toLowerCase().includes(f)) return;

                visibleCount++;
                let l="", b="";
                if(i.k==="video"){l=`https://www.youtube.com/watch?v=${i.v}`; b=`<span class="badge b-vid">VID</span>`;}
                else if(i.k==="playlist"){l=`https://www.youtube.com/playlist?list=${i.p}`; b=`<span class="badge b-pl">PL</span>`;}
                else if(i.k==="channel"){l=`https://www.youtube.com/channel/${i.c}`; b=`<span class="badge b-ch">CH</span>`;}
                
                let imgTag = i.th ? `<img src="${i.th}" class="yt-pic">` : `<div class="yt-pic" style="display:flex;align-items:center;justify-content:center;color:#888;font-size:12px;">No Image</div>`;
                let safeTitle = (i.t||"").replace(/'/g,"\\'").replace(/"/g,'&quot;');
                
                h+=`
                <div class="yt-item" onclick="toggleRow(event, 'i${x}')">
                    <div class="yt-col-chk"><input type="checkbox" class="yt-chk" value="${l}" id="i${x}"></div>
                    <div class="yt-col-img">${imgTag}</div>
                    <div class="yt-col-dat">
                        <div class="yt-ttl">${b}${i.t}</div>
                        <div class="yt-chn">${i.ct}</div>
                    </div>
                    <div class="yt-col-opt">
                        <button class="menu-btn" onclick="openMenu(event, '${i.c}', '${safeTitle}')">⋮</button>
                    </div>
                </div>`;
            }); 
            
            if(visibleCount === 0) {
                $('resDiv').innerHTML="<div style='padding:20px;text-align:center;color:var(--text-muted);'>No items match your current filters.</div>";
            } else {
                $('resDiv').innerHTML=h;
            }
        }

        function filterRes() { drawRes(); }

        function selAll() { 
            let c=document.querySelectorAll('.yt-chk'); 
            let visibleCbs = Array.from(c).filter(cb => cb.closest('.yt-item').style.display !== 'none');
            if(!visibleCbs.length) return; 
            let all = visibleCbs.every(b=>b.checked); 
            visibleCbs.forEach(b=>b.checked=!all); 
        }
        
        function addQ() { 
            let u=Array.from(document.querySelectorAll('.yt-chk:checked')).map(b=>b.value).filter(v=>v); 
            if(!u.length) return; 
            $('qArea').value=$('qArea').value?$('qArea').value+"\n"+u.join('\n'):u.join('\n'); 
            $('status').innerHTML=`<span style='color:var(--primary)'>📦 Added ${u.length} URLs.</span>`; 
        }
    </script>
</body>
</html>
